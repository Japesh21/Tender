name: TGTS Tender Scraper

on:
  schedule:
    - cron: '0 * * * *'   # Every hour (on the hour, UTC)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r tgts_scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        working-directory: tgts_scraper
        env:
          PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          EMAIL_ENABLED: "True"
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: "587"
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WHATSAPP_ENABLED: "True"
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_FROM: ${{ secrets.TWILIO_PHONE_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: python main.py
